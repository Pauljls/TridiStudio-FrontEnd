<div class="min-h-screen bg-black text-white flex">
  <aside
    class="fixed inset-y-0 left-0 z-50 w-64 bg-[#0a0a0a] border-r border-neutral-900 transition-transform duration-300 md:translate-x-0 md:static md:inset-0"
    [class.-translate-x-full]="!isSidebarOpen()"
  >
    <div class="p-6 border-b border-neutral-900 flex justify-between items-center">
      <h1 class="text-xl font-black tracking-tight uppercase">
        Tridi <span class="text-neutral-500">Admin</span>
      </h1>
      <button (click)="toggleSidebar()" class="md:hidden text-neutral-400">✕</button>
    </div>

    <nav class="flex-1 p-4 space-y-2">
      <a
        routerLink="dashboard"
        routerLinkActive="bg-[#1a1a1a] text-white border-neutral-800 shadow-lg"
        class="hover:cursor-pointer flex items-center gap-3 px-4 py-3 text-neutral-400 hover:text-white rounded-xl font-bold transition-all border border-transparent"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"
          ></path>
        </svg>
        Dashboard
      </a>

      <a
        routerLink="orders"
        routerLinkActive="bg-[#1a1a1a] text-white border-neutral-800 shadow-lg"
        class="hover:cursor-pointer flex items-center gap-3 px-4 py-3 text-neutral-400 hover:text-white rounded-xl font-bold transition-all border border-transparent"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"
          ></path>
        </svg>
        Pedidos
      </a>

      <a
        routerLink="catalog"
        routerLinkActive="bg-[#1a1a1a] text-white border-neutral-800 shadow-lg"
        class="hover:cursor-pointer flex items-center gap-3 px-4 py-3 text-neutral-400 hover:text-white rounded-xl font-bold transition-all border border-transparent"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"
          ></path>
        </svg>
        Catálogo
      </a>
    </nav>

    <div class="p-4 border-t border-neutral-900">
      <button
        class="hover:cursor-pointer flex items-center gap-3 px-4 py-3 w-full text-neutral-500 hover:text-red-400 font-medium transition-colors"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
          ></path>
        </svg>
        Cerrar Sesión
      </button>
    </div>
  </aside>

  <main class="flex-1 bg-black min-h-screen">
    <header
      class="md:hidden bg-[#0a0a0a] p-4 border-b border-neutral-900 flex justify-between items-center"
    >
      <span class="font-black uppercase tracking-widest text-xs">Tridi Admin</span>
      <button (click)="toggleSidebar()" class="p-2 bg-[#1a1a1a] rounded-lg">
        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
          <path
            fill-rule="evenodd"
            d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"
            clip-rule="evenodd"
          ></path>
        </svg>
      </button>
    </header>

    <div class="p-4 md:p-10">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
