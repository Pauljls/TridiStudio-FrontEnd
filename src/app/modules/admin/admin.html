<div class="min-h-screen bg-black text-white flex overflow-hidden">
  <app-admin-sidebar #sidebar></app-admin-sidebar>

  <main class="flex-1 bg-black min-h-screen flex flex-col overflow-hidden w-full">
    <header
      class="md:hidden bg-[#0a0a0a] px-4 py-3 border-b border-neutral-900 flex justify-between items-center shrink-0"
    >
      <span class="font-black uppercase tracking-widest text-xs">Tridi Admin</span>
      <button (click)="sidebar.toggleSidebar()" class="p-2 bg-[#1a1a1a] rounded-lg hover:bg-[#2a2a2a] transition-colors">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
          <path
            fill-rule="evenodd"
            d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"
            clip-rule="evenodd"
          ></path>
        </svg>
      </button>
    </header>

    <div class="flex-1 overflow-y-auto w-full">
      <div class="px-3 py-4 md:p-10 w-full">
        <router-outlet></router-outlet>
      </div>
    </div>
  </main>
</div>
