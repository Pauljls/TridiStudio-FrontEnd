<section class="relative py-24 px-6 overflow-hidden">
  <div
    class="absolute inset-0 bg-neutral-900 bg-radial-gradient from-neutral-800 to-black -z-10"
  ></div>

  <div class="max-w-4xl mx-auto text-center flex flex-col items-center gap-8">
    <h2 class="text-4xl md:text-5xl font-black text-white tracking-tight leading-tight" appScrollReveal [revealDelay]="0">
      ¿Listo Para Comenzar Tu <br class="hidden md:block" />
      Colección?
    </h2>

    <div class="space-y-2" appScrollReveal [revealDelay]="100">
      <p class="text-neutral-400 text-base md:text-lg">
        Únete a cientos de coleccionistas que ya confían en nosotros. Envíos a todo Perú.
      </p>
      <p class="text-white font-medium text-sm md:text-base">
        Pago contra entrega disponible en
        <span class="underline decoration-neutral-600 underline-offset-4">Trujillo</span>.
      </p>
    </div>

    <div class="flex flex-col sm:flex-row gap-4 mt-4" appScrollReveal [revealDelay]="200">
      <button
        class="px-8 py-4 bg-white text-black font-bold rounded-2xl hover:bg-neutral-200 transition-all flex items-center justify-center gap-3 shadow-xl hover:cursor-pointer hover:scale-105 hover:transition-all hover:transition-discrete"
        (click)="linkToCatalog()"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5"
          viewBox="0 0 20 20"
          fill="currentColor"
        >
          <path
            d="M3 1a1 1 0 000 2h1.22l.305 1.222a.997.997 0 00.01.042l1.358 5.43-.893.892C3.74 11.846 4.632 14 6.414 14H15a1 1 0 100-2H6.414l1-1H14a1 1 0 00.894-.553l3-6A1 1 0 0017 3H6.28l-.31-1.242A1 1 0 005 1H3z"
          />
        </svg>
        Ver Todos los Productos
      </button>

      <button
        class="px-8 py-4 bg-neutral-900/50 text-white font-bold rounded-2xl border border-neutral-700 hover:bg-neutral-800 transition-all flex items-center justify-center gap-3 backdrop-blur-sm"
      >
        <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
          <path
            d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.588-5.946 0-6.556 5.332-11.888 11.888-11.888 3.176 0 6.161 1.237 8.404 3.48s3.481 5.229 3.481 8.405c0 6.556-5.332 11.888-11.888 11.888-2.019 0-4.004-.512-5.759-1.485l-6.125 1.708zm6.736-1.902c1.474.873 3.103 1.334 4.768 1.334 5.177 0 9.388-4.211 9.388-9.389 0-2.509-.977-4.867-2.751-6.641s-4.132-2.751-6.641-2.751c-5.178 0-9.39 4.211-9.39 9.389 0 1.902.57 3.754 1.649 5.322l-1.091 3.987 4.076-1.102z"
          />
        </svg>
        Contactar por WhatsApp
      </button>
    </div>
  </div>
</section>
