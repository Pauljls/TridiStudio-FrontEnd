<!-- hero.component.html -->

<section
  class="relative flex min-h-screen items-center justify-center overflow-hidden text-white"
  style="background-color: #040404"
>
  <!-- Imagen de fondo -->
  <img
    src="images/show_case.jpeg"
    alt=""
    class="absolute inset-0 z-0 h-full w-full object-cover"
    style="object-position: center 200%"
  />

  <!-- Overlay oscuro -->
  <div
    class="pointer-events-none absolute inset-0 z-10"
    style="background: rgba(0, 0, 0, 0.55)"
  ></div>

  <!-- Viñeta perimetral -->
  <div
    class="pointer-events-none absolute inset-0 z-10"
    style="
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.72) 100%);
    "
  ></div>

  <!-- ③ Contenido principal -->
  <div
    class="relative z-20 mx-auto grid w-full max-w-7xl grid-cols-1 items-center gap-12 p-6 lg:grid-cols-2 lg:gap-16 lg:p-24 md:p-12"
  >
    <!-- Columna izquierda -->
    <div class="flex flex-col gap-8 text-center lg:text-left">
      <div class="space-y-4" appScrollReveal [revealDelay]="0">
        <h2 class="text-4xl font-black leading-tight tracking-tight md:text-5xl lg:text-6xl">
          Estatuas 3D de Colección <br class="hidden md:block" />
          <span class="text-neutral-400">Premium</span>
        </h2>
        <p
          class="mx-auto max-w-lg text-sm font-medium leading-relaxed text-neutral-400 lg:mx-0 md:text-base"
        >
          Impresión 3D profesional + Pintado artesanal a mano. Cada pieza es única y creada con
          pasión en Trujillo, Perú.
        </p>
      </div>

      <div class="flex flex-col justify-center gap-4 sm:flex-row lg:justify-start" appScrollReveal [revealDelay]="100">
        <button
          (click)="toCatalog()"
          class="hover:cursor-pointer flex items-center justify-center gap-2 rounded-full bg-white px-8 py-3.5 font-bold text-black shadow-lg transition-all hover:-translate-y-1 hover:bg-neutral-200 hover:shadow-xl"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path
              d="M3 1a1 1 0 000 2h1.22l.305 1.222a.997.997 0 00.01.042l1.358 5.43-.893.892C3.74 11.846 4.632 14 6.414 14H15a1 1 0 100-2H6.414l1-1H14a1 1 0 00.894-.553l3-6A1 1 0 0017 3H6.28l-.31-1.242A1 1 0 005 1H3z"
            />
          </svg>
          Explorar Catálogo
        </button>
      </div>

      <div class="grid grid-cols-3 gap-2 border-t border-neutral-800 pt-8 sm:gap-4" appScrollReveal [revealDelay]="200">
        <div appScrollReveal [revealDelay]="200">
          <p class="text-xl font-black sm:text-2xl md:text-3xl">500+</p>
          <p class="text-[9px] font-bold uppercase tracking-widest text-neutral-500 sm:text-xs">
            Piezas Creadas
          </p>
        </div>
        <div appScrollReveal [revealDelay]="300">
          <p class="text-xl font-black sm:text-2xl md:text-3xl">300+</p>
          <p class="text-[9px] font-bold uppercase tracking-widest text-neutral-500 sm:text-xs">
            Clientes Felices
          </p>
        </div>
        <div appScrollReveal [revealDelay]="400">
          <p class="text-xl font-black sm:text-2xl md:text-3xl">100%</p>
          <p class="text-[9px] font-bold uppercase tracking-widest text-neutral-500 sm:text-xs">
            Hecho a Mano
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
