<section class="py-16 px-6 bg-[#f8f9fa] text-black">
  <div class="text-center mb-12" appScrollReveal [revealDelay]="0">
    <h2 class="text-3xl md:text-4xl font-bold text-neutral-900 mb-4">
      Explora Nuestras Colecciones
    </h2>
    <p class="text-neutral-500 max-w-2xl mx-auto">
      Desde anime hasta gaming, encuentra la estatua perfecta para tu colección
    </p>
  </div>

  <div class="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
    @for (item of collections; track item.title; let i = $index) {
      <div
        class="group relative h-80 rounded-3xl overflow-hidden cursor-pointer transition-all hover:-translate-y-2 shadow-xl"
        appScrollReveal
        [revealDelay]="i * 100"
      >
        <img
          [src]="item.image"
          [alt]="item.title"
          class="absolute inset-0 w-full h-full object-cover"
        />

        <div class="absolute inset-0 bg-linear-to-b from-transparent to-black/60"></div>

        <div class="relative h-full p-8 flex flex-col justify-end items-start text-white">
          <h3 class="text-2xl font-bold mb-2">{{ item.title }}</h3>
          <p class="text-sm text-neutral-400 mb-6 leading-relaxed">
            {{ item.description }}
          </p>

          <span
            class="px-4 py-1.5 bg-white/10 backdrop-blur-md border border-white/20 rounded-full text-xs font-medium"
          >
            {{ item.count }} productos
          </span>
        </div>
      </div>
    }
  </div>
</section>
