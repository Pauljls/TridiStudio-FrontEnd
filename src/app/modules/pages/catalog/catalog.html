<div class="min-h-screen bg-black text-white pt-32 pb-24 px-6">
  <div class="max-w-7xl mx-auto">
    <app-catalog-header-component
      [totalProducts]="products().length"
      (openMobileFilters)="toggleFilters()"
    />

    <div class="flex flex-col lg:flex-row gap-12">
      <app-catalog-filters-component [isOpen]="isMobileFilterOpen()" (close)="toggleFilters()" />

      <div class="flex-1">
        <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
          @for (prod of products(); track prod.id) {
            <app-product-card-component [product]="prod" />
          }
        </div>

        <div class="mt-16 flex justify-center">
          <button
            class="px-8 py-3 border border-neutral-800 rounded-full font-bold text-sm text-neutral-400 hover:text-white hover:border-neutral-500 transition-all"
          >
            Cargar más productos
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
